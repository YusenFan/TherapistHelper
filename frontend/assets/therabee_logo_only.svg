<?xml version="1.0" encoding="UTF-8"?>
<svg width="1254" height="1254" viewBox="0 0 1254 1254" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Stylized bee logo with yellow wings and rounded heart</title>
  <desc>A clean vector bee logo with yellow wings, teal antennae, a rounded heart-shaped body, and a sprout inside.</desc>

  <defs>
    <linearGradient id="tealGrad" x1="370" y1="290" x2="850" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#006B5F"/>
      <stop offset="0.55" stop-color="#00A98F"/>
      <stop offset="1" stop-color="#008B78"/>
    </linearGradient>

    <linearGradient id="yellowGrad" x1="250" y1="450" x2="1010" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6A000"/>
      <stop offset="0.55" stop-color="#FDB515"/>
      <stop offset="1" stop-color="#F39A00"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1254" height="1254" fill="#FAFAFA"/>

  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left yellow wing -->
    <path d="M472 500
             C405 455 312 462 282 525
             C253 589 294 664 371 672
             C402 675 426 667 444 656"
          stroke="url(#yellowGrad)" stroke-width="30"/>

    <!-- Right yellow wing -->
    <path d="M782 500
             C849 455 942 462 972 525
             C1001 589 960 664 883 672
             C852 675 828 667 810 656"
          stroke="url(#yellowGrad)" stroke-width="30"/>

    <!-- Antennae and head arc -->
    <path d="M528 476
             C531 419 566 386 626 392
             C688 386 723 419 726 476"
          stroke="url(#tealGrad)" stroke-width="30"/>

    <path d="M590 393
             C589 340 560 303 505 289"
          stroke="url(#tealGrad)" stroke-width="23"/>
    <circle cx="505" cy="289" r="19" fill="url(#tealGrad)"/>

    <path d="M664 393
             C665 340 694 303 749 289"
          stroke="url(#tealGrad)" stroke-width="23"/>
    <circle cx="749" cy="289" r="19" fill="url(#tealGrad)"/>

    <!-- Rounded heart body, deliberately smooth and without sharp bottom spike -->
    <path d="M627 558
             C590 515 517 504 476 554
             C435 604 451 690 506 728
             C545 755 591 760 627 760
             C663 760 709 755 748 728
             C803 690 819 604 778 554
             C737 504 664 515 627 558Z"
          stroke="url(#tealGrad)" stroke-width="30"/>

    <!-- Inner sprout -->
    <path d="M627 727
             C627 695 627 672 627 647"
          stroke="url(#tealGrad)" stroke-width="22"/>

    <path d="M624 650
             C589 649 554 634 538 604
             C575 599 611 612 624 650Z"
          fill="url(#tealGrad)"/>

    <path d="M630 650
             C665 649 700 634 716 604
             C679 599 643 612 630 650Z"
          fill="url(#tealGrad)"/>

    <!-- Abdomen stripes -->
    <path d="M512 780
             C548 805 706 805 742 780"
          stroke="url(#yellowGrad)" stroke-width="46"/>

    <path d="M563 871
             C598 895 656 895 691 871"
          stroke="url(#yellowGrad)" stroke-width="36"/>

    <!-- Rounded lower tip, softened rather than sharp -->
    <path d="M591 905
             C607 930 647 930 663 905"
          stroke="url(#yellowGrad)" stroke-width="34"/>
  </g>
</svg>
