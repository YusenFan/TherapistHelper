<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="logo">🐝</div>
    <div>
      <h1>Therabee EHR Sync</h1>
      <p id="page-status" class="page-status">Checking page…</p>
    </div>
  </header>

  <!-- Login view -->
  <section id="view-login" class="view hidden">
    <p class="hint">Sign in with your Therabee account.</p>
    <label>Email</label>
    <input id="login-email" type="email" autocomplete="email" />
    <label>Password</label>
    <input id="login-password" type="password" autocomplete="current-password" />
    <button id="btn-login" class="primary">Sign in</button>
    <p id="login-error" class="error hidden"></p>
  </section>

  <!-- Main view -->
  <section id="view-main" class="view hidden">
    <div class="row space-between">
      <span id="user-email" class="muted"></span>
      <button id="btn-logout" class="link">Sign out</button>
    </div>

    <label>EHR platform</label>
    <div class="row">
      <select id="select-ehr">
        <option value="therapynotes">TherapyNotes</option>
        <option value="simplepractice">SimplePractice</option>
        <option value="janeapp">Jane App</option>
      </select>
      <button id="btn-open-ehr" class="link">Open EHR ↗</button>
    </div>

    <label>Client</label>
    <select id="select-client"><option value="">Loading clients…</option></select>

    <label>Session note</label>
    <select id="select-session" disabled><option value="">Select a client first</option></select>

    <div id="note-preview" class="preview hidden">
      <h2>Note preview</h2>
      <div id="preview-sections"></div>
    </div>

    <button id="btn-transfer" class="primary" disabled>Sync to EHR</button>
    <p id="main-error" class="error hidden"></p>
  </section>

  <!-- Result view -->
  <section id="view-result" class="view hidden">
    <div id="result-icon" class="result-icon"></div>
    <h2 id="result-title"></h2>
    <p id="result-detail" class="muted"></p>
    <ul id="result-fields" class="field-results"></ul>
    <button id="btn-done" class="primary">Done</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
</content>
